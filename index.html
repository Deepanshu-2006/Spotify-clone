<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Clone</title>
  <link rel="stylesheet" href="Spotify.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Spotify Clone</div>
    <nav class="nav">
      <a href="#" class="nav__link">Home</a>
      <a href="#" class="nav__link">Search</a>
      <a href="#" class="nav__link">Library</a>
    </nav>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <button id="btnLoadDemo" class="btn">Load demo playlist</button>
      <div class="sidebar__section">
        <h3>Playlists</h3>
        <ul id="playlist" class="list"></ul>
      </div>
    </aside>

    <section class="content">
      <div class="content__header">
        <h1 id="viewTitle">Songs</h1>
        <div class="search">
          <input id="searchInput" class="search__input" placeholder="Search songs..." />
        </div>
      </div>

      <div id="songs" class="cards"></div>
    </section>
  </main>

  <footer class="player">
    <div class="player__now">
      <div class="cover" aria-hidden="true"></div>
      <div>
        <div id="nowTitle" class="player__title">Not playing</div>
        <div id="nowArtist" class="player__artist">—</div>
      </div>
    </div>

    <div class="player__controls">
      <button id="btnPrev" class="iconbtn" title="Previous">⏮</button>
      <button id="btnPlay" class="iconbtn iconbtn--primary" title="Play/Pause">▶</button>
      <button id="btnNext" class="iconbtn" title="Next">⏭</button>
    </div>

    <div class="player__meta">
      <div class="time">
        <span id="curTime">0:00</span>
        <input id="seek" type="range" min="0" max="100" value="0" />
        <span id="durTime">0:00</span>
      </div>
      <div class="volume">
        <span>🔊</span>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.8" />
      </div>
    </div>

    <audio id="audio" preload="metadata"></audio>
  </footer>

  <script src="Spotify.js"></script>
</body>
</html>
